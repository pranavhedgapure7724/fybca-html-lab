<!DOCTYPE html>
<html>

<head>
    <title>Student Registration App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #e6f7ff;
            font-family: Arial;
        }

        .container-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 2px 2px 8px gray;
            margin-top: 30px;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        #result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #d9ffd9;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student App</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-12">

                <div class="container-box">
                    <h2>Student Registration Form</h2>

                    <label>Name</label>
                    <input type="text" id="name" class="form-control">
                    <span id="nameError" class="error"></span>
                    <br>

                    <label>Email</label>
                    <input type="text" id="email" class="form-control">
                    <span id="emailError" class="error"></span>
                    <br>

                    <label>Mobile Number</label>
                    <input type="text" id="mobile" class="form-control">
                    <span id="mobileError" class="error"></span>
                    <br>

                    <label>Password</label>
                    <input type="password" id="password" class="form-control">
                    <span id="passwordError" class="error"></span>
                    <br>

                    <button class="btn btn-primary w-100" id="register">Register</button>

                    <div id="result"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $("#register").click(function () {
                $(".error").html("");

                var name = $("#name").val();
                var email = $("#email").val();
                var mobile = $("#mobile").val();
                var password = $("#password").val();

                var valid = true;

                if (name == "") {
                    $("#nameError").html("Enter name");
                    valid = false;
                }

                var emailPattern = /^[a-zA-Z0-9._]+@[a-z]+\.[a-z]{2,3}$/;
                if (!emailPattern.test(email)) {
                    $("#emailError").html("Enter valid email");
                    valid = false;
                }

                var mobilePattern = /^[0-9]{10}$/;
                if (!mobilePattern.test(mobile)) {
                    $("#mobileError").html("Enter valid number");
                    valid = false;
                }

                if (password.length < 6) {
                    $("#passwordError").html("Password minimum 6 characters");
                    valid = false;
                }

                if (valid) {
                    $("#result").show();
                    $("#result").html("Registration Successful");
                }
            });
        });
    </script>

</body>

</html>
