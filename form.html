<!DOCTYPE html>

<body> 
    
    <h1> STUDENT REGISTRATION FORM </h1>
    <form>
        <lable>Username:</lable><br>
        <input type="text" placeholder="Entre your username" required><br>

        <label>Password:</label><br>
        <input type="password" placeholder="entre the password"><br>

        <label>Email:</label><br>
        <input type="email" placeholder="entre the email"><br>

        <label>Age:</label><br>
        <input type="number" placeholder="entre the age"><br>

        <lable>Date Of Birth:</lable><br>
        <input type="date"><br>

        <lable>Profile Picture</lable><br>
        <input type="file"><br>

        <lable>Gender:</lable><br>
        <input type="radio"> male
        <input type="radio"> female
        <br><br>

            
        <lable>Interest:</lable><br>
        <input type="checkbox"> Coding
        <input type="checkbox"> Music
        <br><br>

        <lable>Bio:</lable>
        <input type="textarea" placeholder="tell about yourself"><br>
        <br><br>
        <label>Country:</label><br>
        <select>
            <option>India</option>
            <option>UK</option>
            <option>USA</option>
            <option>Africa</option>
        </select><br><br>
        <label>Favourite colour:</label><br>
        <input type="colour">
           <br><br>
        <label>Experience (Years):</label>
        <input type="range" min="0" max="18"
        <input type="number"><br><br>
         <input type="submit"><br>
         <input type="reset"><br>


        </form>
    </form>
</body>
</html>
