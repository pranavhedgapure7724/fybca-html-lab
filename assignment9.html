<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Bootstrap Grid</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa; /* soft neutral background */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .grid-box {
      border: 1px solid #dee2e6;
      text-align: center;
      padding: 20px 0;
      margin-bottom: 10px;
      font-weight: 500;
      color: #343a40;
    }
    /* Professional muted palette */
    .row:nth-child(1) .grid-box { background-color: #e3f2fd; } /* light blue */
    .row:nth-child(2) .grid-box { background-color: #d1c4e9; } /* lavender */
    .row:nth-child(3) .grid-box { background-color: #c8e6c9; } /* soft green */
    .row:nth-child(4) .grid-box { background-color: #ffe0b2; } /* warm beige */
    .row:nth-child(5) .grid-box { background-color: #ffccbc; } /* muted coral */
  </style>
</head>
<body>
  <div class="container">
    <!-- Row 1: 12 columns of block 1 -->
    <div class="row">
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
      <div class="col-1 grid-box">block 1</div>
    </div>

    <!-- Row 2: 3 columns of block 4 -->
    <div class="row">
      <div class="col-4 grid-box">block 4</div>
      <div class="col-4 grid-box">block 4</div>
      <div class="col-4 grid-box">block 4</div>
    </div>

    <!-- Row 3: block 4 + block 8 -->
    <div class="row">
      <div class="col-4 grid-box">block 4</div>
      <div class="col-8 grid-box">block 8</div>
    </div>

    <!-- Row 4: block 6 + block 6 -->
    <div class="row">
      <div class="col-6 grid-box">block 6</div>
      <div class="col-6 grid-box">block 6</div>
    </div>

    <!-- Row 5: block 12 -->
    <div class="row">
      <div class="col-12 grid-box">block 12</div>
    </div>
  </div>
</body>
</html>
