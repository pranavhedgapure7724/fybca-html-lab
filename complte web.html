<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Website</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            font-family: Arial, sans-serif;
        }

        .hero{
            background-color: #0d6efd;
            color: white;
            padding: 100px 0;
            text-align: center;
        }

        .card:hover{
            transform: scale(1.05);
            transition: 0.3s;
        }

        footer{
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">MySite</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#home">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#services">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero" id="home">
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>Bootstrap and jQuery Mini Project</p>

        <button class="btn btn-light mt-3" id="btnClick">
            Click Me
        </button>
    </div>
</section>

<!-- Services -->
<section class="py-5" id="services">
    <div class="container">

        <h2 class="text-center mb-5">Our Services</h2>

        <div class="row">

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h4>Web Design</h4>
                    <p>Create responsive websites.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h4>Bootstrap</h4>
                    <p>Modern UI using Bootstrap.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h4>jQuery</h4>
                    <p>Add animations and effects.</p>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Contact -->
<section class="bg-light py-5" id="contact">
    <div class="container">

        <h2 class="text-center mb-4">Contact Us</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <form id="contactForm">

                    <input type="text" class="form-control mb-3" placeholder="Enter Name" required>

                    <input type="email" class="form-control mb-3" placeholder="Enter Email" required>

                    <textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>

                    <button class="btn btn-primary w-100">
                        Submit
                    </button>

                </form>

                <div class="alert alert-success mt-3 d-none" id="msg">
                    Form Submitted Successfully!
                </div>

            </div>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 Student Website</p>
</footer>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery Code -->
<script>

$(document).ready(function(){

    // Button Click
    $("#btnClick").click(function(){
        alert("Welcome Student!");
    });

    // Form Submit
    $("#contactForm").submit(function(e){
        e.preventDefault();

        $("#msg").removeClass("d-none");

        $(this)[0].reset();
    });

});

</script>

</body>
</html>
