<!DOCTYPE html>
<html>

<head>
    <title>Student Information App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #e8f0ff;
            font-family: Arial;
        }

        .mainbox {
            width: 60%;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 2px 2px 10px gray;
        }

        h1 {
            text-align: center;
            color: navy;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #fff4cc;
            border-radius: 10px;
            display: none;
        }
    </style>

</head>

<body>

    <div class="mainbox">
        <h1>Student Information Form</h1>

        <label>Name</label>
        <input type="text" class="form-control" id="name">
        <br>

        <label>Roll Number</label>
        <input type="number" class="form-control" id="roll">
        <br>

        <label>Course</label>
        <input type="text" class="form-control" id="course">
        <br>

        <label>Marks</label>
        <input type="number" class="form-control" id="marks">
        <br>

        <button class="btn btn-primary" id="submit">Submit</button>

        <div class="result" id="output">
        </div>

    </div>

    <script>
        $(document).ready(function () {

            $("#submit").click(function () {

                var name = $("#name").val();
                var roll = $("#roll").val();
                var course = $("#course").val();
                var marks = $("#marks").val();

                var grade = "";

                if (marks >= 75) {
                    grade = "A";
                }
                else if (marks >= 50) {
                    grade = "B";
                }
                else {
                    grade = "C";
                }

                $("#output").show();
                $("#output").html(
                    "Name: " + name + "<br>" +
                    "Roll No: " + roll + "<br>" +
                    "Course: " + course + "<br>" +
                    "Marks: " + marks + "<br>" +
                    "Grade: " + grade
                );

            });

        });
    </script>

</body>

</html>
