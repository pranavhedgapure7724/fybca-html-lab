<!DOCTYPE html>
<html>

<head>
    <title>Student Course Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #eef5ff;
            font-family: Arial;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .courseBox {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 2px 2px 8px lightgray;
        }

        .courseBox:hover {
            transform: translateY(-5px);
            transition: 0.5s;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Student Course Application</h1>
        <p>Using Bootstrap Grid System and jQuery</p>
    </div>

    <div class="container mt-4">
        <div class="row">

            <div class="col-lg-4 col-md-6 col-sm-12">
                <div class="courseBox">
                    <h3>Web Development</h3>
                    <p>HTML CSS JavaScript</p>
                    <button class="btn btn-primary select">Select</button>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-sm-12">
                <div class="courseBox">
                    <h3>Java Programming</h3>
                    <p>Core Java Basics</p>
                    <button class="btn btn-success select">Select</button>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-sm-12">
                <div class="courseBox">
                    <h3>Database</h3>
                    <p>SQL and Database Concepts</p>
                    <button class="btn btn-warning select">Select</button>
                </div>
            </div>

        </div>

        <div id="result">
            Selected course will appear here.
        </div>

    </div>

    <script>
        $(document).ready(function () {

            $(".select").click(function () {
                var course = $(this).parent().find("h3").text();
                $("#result").html("You selected: " + course);
            });

        });
    </script>

</body>

</html>
