<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #f0f4ff;
            font-family: Arial;
        }

        .card {
            border-radius: 15px;
            transition: 0.5s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .box {
            padding: 20px;
            margin-top: 20px;
        }

        footer {
            background: #0d6efd;
            color: white;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Student Dashboard</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container box">
        <div class="row">

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Assignments</h3>
                    <p>Check pending assignments</p>
                    <button class="btn btn-primary open">Open</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Attendance</h3>
                    <p>View attendance details</p>
                    <button class="btn btn-success open">Open</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h3>Results</h3>
                    <p>View semester results</p>
                    <button class="btn btn-danger open">Open</button>
                </div>
            </div>

        </div>

        <div class="mt-4 p-3 bg-white rounded shadow">
            <h4>Activity Section</h4>
            <p id="result">Click any card button.</p>
        </div>
    </div>

    <footer>
        Simple Web Application Layout Using Bootstrap and jQuery
    </footer>

    <script>
        $(document).ready(function () {
            $(".open").click(function () {
                var data = $(this).parent().find("h3").text();
                $("#result").html(data + " section opened successfully");
            });
        });
    </script>

</body>

</html>
